###############################################################################
# AI Demo Case - Reusable Terraform Workflow
# Called by terraform.yml for plan and apply operations
###############################################################################

name: AI Demo Case - Terraform Reusable

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'Terraform working directory'
        required: false
        type: string
        default: 'terraform'
      terraform_version:
        description: 'Terraform version'
        required: false
        type: string
        default: '1.14.4'
      apply:
        description: 'Whether to run terraform apply'
        required: false
        type: boolean
        default: false
      run_search_setup:
        description: 'Whether to run search index setup after apply'
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform ${{ inputs.apply && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_IN_AUTOMATION: true
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: true

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="backend.tfvars" \
            -backend-config="storage_account_name=${{ vars.STORAGE_ACCOUNT_NAME }}" \
            -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="unique_variable_name_suffix=${{ vars.UNIQUE_SUFFIX }}" \
            -input=false \
            -no-color \
            -out=tfplan
        continue-on-error: true

      - name: Upload Plan Artifact
        if: inputs.apply == false
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 5

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request' && inputs.apply == false
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const planOutput = process.env.PLAN_OUTPUT || 'No plan output available';
            const output = `### Terraform Plan 📋

            #### Format Check 🖌 \`${{ steps.fmt.outcome }}\`
            #### Initialization ⚙️ \`${{ steps.init.outcome }}\`
            #### Validation 🤖 \`${{ steps.validate.outcome }}\`
            #### Plan 📖 \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan Output</summary>

            \`\`\`terraform
            ${planOutput}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Terraform Plan')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: output
              });
            }

      - name: Plan Status Check
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: inputs.apply == true
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            tfplan

      - name: Search Index Setup
        if: inputs.apply == true && inputs.run_search_setup == true
        working-directory: ${{ github.workspace }}
        run: |
          pip install -r search-setup/requirements.txt

          cd ${{ inputs.working_directory }}

          # Extract terraform outputs into env vars (mask sensitive ones)
          SEARCH_ENDPOINT=$(terraform output -raw search_endpoint)
          SEARCH_ADMIN_KEY=$(terraform output -raw search_admin_key)
          STORAGE_CONN=$(terraform output -raw storage_connection_string)
          OPENAI_ENDPOINT=$(terraform output -raw openai_endpoint)
          AI_SERVICES_ENDPOINT=$(terraform output -raw ai_services_endpoint)
          TERMS_CONTAINER=$(terraform output -raw terms_container_name)

          echo "::add-mask::${SEARCH_ADMIN_KEY}"
          echo "::add-mask::${STORAGE_CONN}"

          export AZURE_SEARCH_ENDPOINT="${SEARCH_ENDPOINT}"
          export AZURE_SEARCH_ADMIN_KEY="${SEARCH_ADMIN_KEY}"
          export AZURE_STORAGE_CONNECTION_STRING="${STORAGE_CONN}"
          export AZURE_STORAGE_CONTAINER="${TERMS_CONTAINER}"
          export AZURE_OPENAI_ENDPOINT="${OPENAI_ENDPOINT}"
          export AZURE_AI_SERVICES_ENDPOINT="${AI_SERVICES_ENDPOINT}"

          cd ${{ github.workspace }}
          python search-setup/setup_search_index.py

      - name: Azure Logout
        if: always()
        run: az logout
        continue-on-error: true
