###############################################################################
# AI Demo Case - Reusable Function App Deploy Workflow
# Deploys the Python Function App to Azure
###############################################################################

name: AI Demo Case - App Deploy (Reusable)

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'Function app working directory'
        required: false
        type: string
        default: 'function-app'

jobs:
  deploy:
    name: Deploy Function App
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Azure Functions Core Tools v4
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
          sudo mv microsoft.gpg /etc/apt/trusted.gpg.d/microsoft.gpg
          sudo sh -c 'echo "deb [arch=amd64] https://packages.microsoft.com/repos/microsoft-ubuntu-$(lsb_release -cs)-prod $(lsb_release -cs) main" > /etc/apt/sources.list.d/dotnetdev.list'
          sudo apt-get update
          sudo apt-get install -y azure-functions-core-tools-4

      - name: Deploy Function App
        run: |
          FUNCTION_APP_NAME="${{ vars.UNIQUE_SUFFIX }}-func-${{ vars.PROJECT_NAME || 'frauddetect' }}"
          echo "Deploying to: ${FUNCTION_APP_NAME}"
          for attempt in 1 2 3; do
            echo "Deployment attempt ${attempt}..."
            if func azure functionapp publish "${FUNCTION_APP_NAME}" --python --build remote; then
              echo "Deployment succeeded on attempt ${attempt}"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deployment failed, retrying in 30s..."
              sleep 30
            fi
          done
          echo "Deployment failed after 3 attempts"
          exit 1

      - name: Print Function App URL
        run: |
          FUNCTION_APP_NAME="${{ vars.UNIQUE_SUFFIX }}-func-${{ vars.PROJECT_NAME || 'frauddetect' }}"
          echo "Function App URL: https://${FUNCTION_APP_NAME}.azurewebsites.net"
          echo "## Function App Deployed" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://${FUNCTION_APP_NAME}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY

      - name: Azure Logout
        if: always()
        run: az logout
        continue-on-error: true
